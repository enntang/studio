name: Sync Notion Content

on:
  # 手動觸發
  workflow_dispatch:

  # 定時：每天 UTC 00:00（台灣 08:00）
  schedule:
    - cron: '0 0 * * *'

# push 同步結果 + 觸發部署 workflow 所需的權限
permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts/notion-sync
          npm install

      - name: Sync from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_WALLPAPERS_DATABASE_ID: ${{ secrets.NOTION_WALLPAPERS_DATABASE_ID }}
        run: |
          cd scripts/notion-sync
          node index.mjs
          node wallpapers.mjs

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync works and wallpapers from Notion"
          git pull --rebase origin main || (git rebase --abort && exit 1)
          git push

      - name: Trigger deploy
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'main'
            })
